<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Система учета времени</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app" class="container mt-5">
        <ul class="nav nav-pills mb-4">
            <li class="nav-item">
                <button class="nav-link" :class="{active: view === 'records'}" @click="view = 'records'">Учет времени</button>
            </li>
            <li class="nav-item">
                <button class="nav-link" :class="{active: view === 'projects'}" @click="view = 'projects'">Проекты</button>
            </li>
        </ul>

        <div v-if="view === 'records'">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Проводки</h2>
                <div class="btn-group me-2">
                    <button class="btn btn-outline-secondary" @click="mode = 'day'" :class="{active: mode === 'day'}">День</button>
                    <button class="btn btn-outline-secondary" @click="mode = 'month'" :class="{active: mode === 'month'}">Месяц</button>
                </div>
                <input type="date" v-model="selectedDate" @change="fetchData" class="form-control w-auto">
            </div>

            <div v-if="mode === 'day' && records.length > 0" :class="['alert', stickerClass, 'mb-4']">
                <strong>Итого за день:</strong> {{ totalHours }} ч. {{ stickerMessage }}
            </div>

            <div v-if="mode === 'day'" class="card mb-4 shadow-sm">
                <div class="card-body">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <select v-model="newRecord.workTaskId" class="form-select">
                                <option value="0" disabled>Выберите задачу...</option>
                                <option v-for="task in activeTasks" :key="task.id" :value="task.id">{{ task.name }}</option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <input type="number" v-model.number="newRecord.hours" class="form-control" placeholder="Часы">
                        </div>
                        <div class="col-md-4">
                            <input type="text" v-model="newRecord.description" class="form-control" placeholder="Описание">
                        </div>
                        <div class="col-md-2">
                            <button @click="saveRecord" class="btn btn-primary w-100">Ок</button>
                        </div>
                    </div>
                </div>
            </div>

            <table class="table table-hover border">
                <thead class="table-light">
                    <tr>
                        <th>Дата</th>
                        <th>Задача</th>
                        <th>Описание</th>
                        <th>Часы</th>
                    </tr>
                </thead>
                <tbody>
                    <tr v-for="record in records" :key="record.id">
                        <td>{{ formatDate(record.date) }}</td>
                        <td>{{ record.workTask?.name }}</td>
                        <td>{{ record.description }}</td>
                        <td><span class="badge bg-primary">{{ record.hours }} ч.</span></td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div v-if="view === 'projects'">
            <h3>Учет проектов</h3>
            <div class="card mb-4">
                <div class="card-body">
                    <div class="row g-2">
                        <div class="col-md-4"><input v-model="newProject.name" class="form-control" placeholder="Название проекта"></div>
                        <div class="col-md-3"><input v-model="newProject.code" class="form-control" placeholder="Код"></div>
                        <div class="col-md-3">
                            <div class="form-check mt-2">
                                <input type="checkbox" v-model="newProject.isActive" class="form-check-input" id="act">
                                <label class="form-check-label" for="act">Активен</label>
                            </div>
                        </div>
                        <div class="col-md-2"><button @click="addProject" class="btn btn-success w-100">Добавить</button></div>
                    </div>
                </div>
            </div>
            <table class="table border">
                <thead><tr><th>Код</th><th>Название</th><th>Статус</th></tr></thead>
                <tbody>
                    <tr v-for="p in allProjects" :key="p.id">
                        <td><code>{{ p.code }}</code></td>
                        <td>{{ p.name }}</td>
                        <td><span :class="p.isActive ? 'text-success' : 'text-danger'">{{ p.isActive ? '● Активен' : '○ Пауза' }}</span></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
        <script src="app.js"></script>
    </body>
</html>
